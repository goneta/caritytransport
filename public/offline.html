<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#111827" />
  <title>Carity Transport — Offline</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #111827, #1d4ed8);
      color: #fff;
    }
    main {
      width: min(92vw, 460px);
      padding: 2rem;
      border-radius: 1.25rem;
      background: rgba(17, 24, 39, 0.82);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
      border: 1px solid rgba(255, 255, 255, 0.16);
    }
    img { width: 72px; height: 72px; border-radius: 1rem; }
    h1 { font-size: 1.5rem; margin: 1rem 0 0.5rem; }
    p { line-height: 1.55; color: #dbeafe; }
    button {
      margin-top: 1rem;
      border: 0;
      border-radius: 0.75rem;
      padding: 0.8rem 1rem;
      background: #10b981;
      color: #052e1a;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main>
    <img src="/icons/icon-192.png" alt="Carity Transport icon" />
    <h1>You are offline</h1>
    <p>Carity Transport needs a secure connection for live bookings, route tracking, payments, and pupil records. Previously installed app assets remain available, but sensitive dashboard data is not stored offline.</p>
    <button type="button" onclick="window.location.reload()">Try again</button>
  </main>
</body>
</html>
